function pct(sub,form){
  const ts=SUBJ[sub].forms[form];
  const done=ts.filter(t=>S.progress[sub+'_'+form+'_'+t.id]).length;
  return{done,total:ts.length,pct:Math.round(done/ts.length*100)};
}
function totalDone(){return Object.keys(S.progress).filter(k=>S.progress[k]).length;}
function totalTopics(){return Object.values(SUBJ).reduce((a,s)=>a+Object.values(s.forms).reduce((b,ts)=>b+ts.length,0),0);}
function subjectDone(sub){

      <button class="btn-s" onclick="markDone()">✓ Mark Done</button>

  } else {
    const ans=Object.keys(S.quizAnswers).length;
    html+=`<div class="q-status">${ans} of ${qs.length} questions answered · <b>${S.topicName}</b> · Form ${S.form}</div>`;
  }
  html+=qs.map((q,i)=>{

      <div class="quiz-qtext">${i+1}. ${q.question}</div>
      ${q.options.map(opt=>{

function renderMd(text){
  if(!text)return'';
  const lines=text.split('\n');const out=[];let inUl=false,inOl=false;
  for(const line of lines){
    const l=line.trim();
    if(l.startsWith('## ')){close();out.push('<h2>'+mdInline(l.slice(3))+'</h2>');}
    else if(l.startsWith('### ')){close();out.push('<h3>'+mdInline(l.slice(4))+'</h3>');}
    else if(/^\d+\. /.test(l)){if(inUl){out.push('</ul>');inUl=false;}if(!inOl){out.push('<ol>');inOl=true;}out.push('<li>'+mdInline(l.replace(/^\d+\. /,''))+'</li>');}
    else if(/^[-•] /.test(l)){if(inOl){out.push('</ol>');inOl=false;}if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+mdInline(l.replace(/^[-•] /,''))+'</li>');}
    else{close();if(l)out.push('<p>'+mdInline(l)+'</p>');}
  }
  close();
  function close(){if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}}
  return out.join('');
}
function mdInline(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');}

## Lesson Notes

In the number 47,359:
- 7 is in the tens place → value = 7 × 10 = 70

### Number Bases
**Base 2 (Binary):** Uses only digits 0 and 1

- Factors of 12: 1, 2, 3, **6**, 12

- Multiples of 6: 6, 12, 18...

      { question: 'In the number 4,372, what is the value of digit 3?', options: ['3', '30', '300', '3000'], answer: 'C', explanation: '3 is in the hundreds place = 3 × 100 = 300' }
    ]
  },
  'fractions': {
    questions: [
      { question: 'Simplify 8/12 to its lowest terms.', options: ['4/6', '2/3', '1/3', '3/4'], answer: 'B', explanation: 'GCD of 8 and 12 is 4. 8÷4=2, 12÷4=3. Answer: 2/3' },
      { question: 'What is 1/4 + 1/6?', options: ['1/10', '2/10', '5/12', '1/2'], answer: 'C', explanation: 'LCD = 12. 1/4=3/12, 1/6=2/12. Total = 5/12' },
      { question: 'Convert 9/4 to a mixed number.', options: ['2 1/4', '2 1/2', '2 3/4', '3 1/4'], answer: 'A', explanation: '9÷4 = 2 remainder 1. So 9/4 = 2 1/4' },
      { question: 'What is 3/5 × 10/9?', options: ['30/45', '2/3', '1/2', '1 1/3'], answer: 'B', explanation: '3/5 × 10/9 = 30/45 = 2/3 (simplified)' },
      { question: 'What is 4/5 ÷ 2/3?', options: ['6/5', '12/15', '5/6', '1 1/5'], answer: 'A', explanation: '4/5 ÷ 2/3 = 4/5 × 3/2 = 12/10 = 6/5 = 1 1/5' }
    ]
  },
  'algebra-intro': {
    questions: [
      { question: 'Simplify: 3x + 2x', options: ['5x', '5x²', '6x', '5'], answer: 'A', explanation: '3x + 2x = (3+2)x = 5x' },
      { question: 'If x = 3, find the value of 2x + 5', options: ['11', '8', '10', '6'], answer: 'A', explanation: '2(3) + 5 = 6 + 5 = 11' },
      { question: 'Solve: x + 7 = 15', options: ['x = 8', 'x = 7', 'x = 22', 'x = -8'], answer: 'A', explanation: 'x = 15 - 7 = 8' },
      { question: 'Simplify: 5(a + b) - 3(a + b)', options: ['2a + 2b', '2a + b', '5a', '2(a + b)'], answer: 'A', explanation: '5(a+b) - 3(a+b) = (5-3)(a+b) = 2(a+b) = 2a + 2b' },
      { question: 'Factorize: 6x + 9', options: ['3(2x + 3)', '2(3x + 9)', '6(x + 9)', '3(6x + 3)'], answer: 'A', explanation: 'HCF of 6x and 9 is 3. 6x + 9 = 3(2x + 3)' }
    ]
  }
};

async function callClaude(userMsg, sysMsg) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: sysMsg, messages: [{ role: 'user', content: userMsg }] })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || 'API error');
  return d.content.map(b => b.text || '').join('');
}

function openSubject(k){S.view='subject';S.subject=k;S.form=1;render();}
function setForm(f){S.form=f;render();}

async function openLesson(id,name){
  S.view='lesson';S.topicId=id;S.topicName=name;S.lesson=null;S.qc=null;S.qcAnswers={};S.loading=true;S.err=null;render();
  const s=SUBJ[S.subject];
  try{
    const sys=`You are Kenya's best KCSE teacher. You teach using the KLB textbook. Your students go from failing to scoring A grades. Your lessons are clear, thorough, and exam-focused. Use simple English. Include all KCSE-required content.`;
    const txt=await callClaude(`Create a complete KCSE lesson on "${name}" for Form ${S.form} ${s.name} based on the KLB textbook.

## What You Will Learn
(3 clear learning objectives for this KCSE topic)

## Key Terms & Definitions
(All important terms the KCSE examiner will test — define each clearly)

## Lesson Notes
(Full, thorough notes following KLB content. Explain everything step by step. Include any important diagrams students should draw in their exercise book)

## Formulas, Laws & Rules
(Every formula, law or equation for this topic. Show each formula and explain each symbol)

## KCSE Worked Examples
(3 fully solved problems at KCSE level. Show all working step by step)

## What KCSE Examiners Test
(Specific question types, common phrasing, mark allocation tips)

## Common Mistakes Kenyan Students Make
(4 specific mistakes — and exactly how to avoid them)

## Exam Checklist
(10 things to know for KCSE — as bullet points starting with "I can...")`,sys);
    S.lesson=txt;

    const qcTxt=await callClaude(`Create 1 quick-check question on "${name}" for KCSE Form ${S.form} ${s.name}.
Return ONLY JSON: {"question":"...","options":["option A","option B","option C","option D"],"correct":0,"explanation":"..."}
correct is the index (0,1,2,3) of the right answer. No markdown.`,sys);
    try{let c=qcTxt.replace(/```json|```/g,'').trim();const st=c.indexOf('{');if(st>0)c=c.slice(st);S.qc=JSON.parse(c);}catch(e){S.qc=null;}
    S.loading=false;render();
  }catch(e){S.loading=false;S.err='Could not load lesson: '+e.message;render();}
}

function checkQC(i){S.qcAnswers[0]=i;const el=document.getElementById('lesson-md');if(el)el.parentElement.querySelector('.quick-check')&&(document.querySelector('.quick-check').outerHTML=renderQC());render();}

async function startQuiz(id,name){
  S.view='quiz';S.topicId=id;S.topicName=name;S.quiz=null;S.quizAnswers={};S.quizSubmitted=false;S.loading=true;S.err=null;render();
  const s=SUBJ[S.subject];
  try{
    const sys=`You are a KCSE examiner for ${s.name}. Create questions exactly like real KCSE past papers. Return ONLY valid JSON, nothing else.`;
    const txt=await callClaude(`Generate a 10-question KCSE-style multiple choice quiz on "${name}" for Form ${S.form} ${s.name}. Base questions on KLB textbook and past KCSE papers.

Return ONLY this JSON (no markdown, no extra text):
{"questions":[{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"answer":"A","explanation":"Short explanation of the correct answer"}]}

Q1-3: Basic recall/definitions (Form ${S.form} level)
Q4-7: Understanding and application (KCSE Paper 1 style)  
Q8-10: Analysis and calculation (KCSE Paper 2 style)
All distractors should be plausible. One answer only. Answer field is just the letter A, B, C or D.`,sys);
    let c=txt.replace(/```json|```/g,'').trim();const st=c.indexOf('{');if(st>0)c=c.slice(st);
    S.quiz=JSON.parse(c);S.loading=false;render();
  }catch(e){S.loading=false;S.err='Quiz error: '+e.message;render();}
}

function selectA(qi,l){S.quizAnswers[qi]=l;render();}
function submitQuiz(){if(Object.keys(S.quizAnswers).length<S.quiz.questions.length){alert('Please answer all 10 questions first.');return;}S.quizSubmitted=true;const sc=S.quiz.questions.filter((q,i)=>S.quizAnswers[i]===q.answer).length;if(sc>=8)markDone(true);render();}
function markDone(silent){S.progress[S.subject+'_'+S.form+'_'+S.topicId]=true;if(!silent)render();}
function goBack(){if(S.view==='lesson'||S.view==='quiz'){S.view='subject';render();}else{S.view='dashboard';render();}}
function goSchedule(){S.view='schedule';render();}
render();
</script>
